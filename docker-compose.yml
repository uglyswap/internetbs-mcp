services:
  internetbs-mcp:
    build: .
    container_name: internetbs-mcp
    restart: unless-stopped
    environment:
      - INTERNETBS_API_KEY=${INTERNETBS_API_KEY}
      - INTERNETBS_PASSWORD=${INTERNETBS_PASSWORD}
      - INTERNETBS_API_URL=${INTERNETBS_API_URL:-https://api.internet.bs}
    stdin_open: true
    # MCP servers communicate via stdio - connect to this container's stdin/stdout
    # For use with MCP clients that support Docker transport
